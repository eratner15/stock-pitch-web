name = "stock-pitch-web"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Public mount: research.levincap.com is pure research content (lcs-portfolio-intel).
# stock-pitch-web instead mounts under levincap.com/stock-pitch as the "build
# a pitch" tool. The path-mount wrapper in src/index.ts strips the prefix on
# the way in and rewrites absolute paths + a fetch() wrapper on the way out.
routes = [
  { pattern = "levincap.com/stock-pitch", zone_name = "levincap.com" },
  { pattern = "levincap.com/stock-pitch/*", zone_name = "levincap.com" },
  { pattern = "www.levincap.com/stock-pitch", zone_name = "levincap.com" },
  { pattern = "www.levincap.com/stock-pitch/*", zone_name = "levincap.com" },
  { pattern = "research.levincap.com/stock-pitch", zone_name = "levincap.com" },
  { pattern = "research.levincap.com/stock-pitch/*", zone_name = "levincap.com" }
]
workers_dev = true

# Portal generation via waitUntil needs extended wall-clock budget.
# 5 minutes gives us room for Workers AI calls + EDGAR fetches.
[placement]
mode = "smart"

[limits]
cpu_ms = 300000

[vars]
ENVIRONMENT = "production"

[[kv_namespaces]]
binding = "REQUESTS"
id = "3b589a51483143e399b7f69ccaf2d6f0"

[[d1_databases]]
binding = "DB"
database_name = "stock-pitch-db"
database_id = "ec74e895-3984-4d1b-ba35-5111a7d3fcef"

# Native Cloudflare Workers AI — for free-tier Gemma generation
[ai]
binding = "AI"

# Browser Rendering — for auto-generated OG share card PNGs
[browser]
binding = "BROWSER"

# Cron: nightly price refresh + batch queue processing every 3 min
[triggers]
crons = ["0 23 * * *", "*/3 * * * *"]

# Inline markdown skill files as strings so we can `import skill from '...md'`
# This is what lets src/lib/ai-brief.ts pull src/skills/equity-brief/SKILL.md
# as its procedure source.
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true
